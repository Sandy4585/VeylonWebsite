<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Veylon Energy — Stacked Monochrome -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <title>Veylon Energy stacked monochrome</title>
  <desc>Stacked logo in single-color black for single-ink printing</desc>

  <g transform="translate(120, 70)">
    <path d="M -34 -4 A 34 34 0 0 1 34 -4"
          stroke="#000000" stroke-width="1.2" fill="none"
          stroke-dasharray="2.5 3" stroke-linecap="round"/>
    <circle cx="0" cy="-38" r="2.8" fill="#000000"/>
    <path d="M -19 4 A 19 19 0 0 1 19 4 Z" fill="#000000"/>
    <line x1="-38" y1="4" x2="38" y2="4"
          stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="120" y="148" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="28" font-weight="600" letter-spacing="5"
        fill="#000000">VEYLON</text>
  <text x="120" y="170" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="10" font-weight="400" letter-spacing="6"
        fill="#000000">ENERGY</text>
</svg>
