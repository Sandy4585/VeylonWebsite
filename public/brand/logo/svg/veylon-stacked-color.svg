<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Veylon Energy — Stacked Primary Logo (Color) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <title>Veylon Energy</title>
  <desc>Veylon Energy stacked logo — mark above wordmark</desc>

  <!-- MARK centered -->
  <g transform="translate(120, 70)">
    <path d="M -34 -4 A 34 34 0 0 1 34 -4"
          stroke="#0A2540" stroke-width="1.2" fill="none"
          stroke-dasharray="2.5 3" stroke-linecap="round"/>
    <circle cx="0" cy="-38" r="2.8" fill="#00A86B"/>
    <path d="M -19 4 A 19 19 0 0 1 19 4 Z" fill="#F5B700"/>
    <line x1="-38" y1="4" x2="38" y2="4"
          stroke="#0A2540" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK below, centered -->
  <text x="120" y="148" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="28" font-weight="600" letter-spacing="5"
        fill="#0A2540">VEYLON</text>
  <text x="120" y="170" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="10" font-weight="400" letter-spacing="6"
        fill="#6B7280">ENERGY</text>
</svg>
