<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Veylon Energy — Horizontal Monochrome (Black only) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <title>Veylon Energy monochrome</title>
  <desc>Veylon Energy horizontal logo in single-color black for single-ink printing</desc>

  <g transform="translate(60, 60)">
    <path d="M -34 -4 A 34 34 0 0 1 34 -4"
          stroke="#000000" stroke-width="1.2" fill="none"
          stroke-dasharray="2.5 3" stroke-linecap="round"/>
    <circle cx="0" cy="-38" r="2.8" fill="#000000"/>
    <path d="M -19 4 A 19 19 0 0 1 19 4 Z" fill="#000000"/>
    <line x1="-38" y1="4" x2="38" y2="4"
          stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="120" y="62"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="34" font-weight="600" letter-spacing="6"
        fill="#000000">VEYLON</text>
  <text x="120" y="86"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="11" font-weight="400" letter-spacing="7"
        fill="#000000">ENERGY</text>
</svg>
